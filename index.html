<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMPION - P1</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: #ffb347;
            background: linear-gradient(-45deg, #ffcc33, #ffb347, #ff5e62, #ff99cc);
            background-size: 400% 400%;
            animation: sunsetGradient 12s ease infinite;
            color: white;
            font-family: 'Garamond', serif;
            overflow-x: hidden;
        }


        body.scroll-locked {
            overflow: hidden !important;
            height: 100vh !important;
        }
        #particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* So she can still click links/text */
    z-index: 1; /* Behind Oscar and the text */
}

        @keyframes sunsetGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.8) 0%, rgba(138, 43, 226, 0.4) 25%, rgba(138, 43, 226, 0.1) 50%, rgba(138, 43, 226, 0) 80%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            transform: translate3d(-500px, -500px, 0);
            transition: transform 0.1s ease-out;
            will-change: transform;
            filter: blur(10px);
            mix-blend-mode: screen;
            opacity: 0;
        }

        #oscar-cursor {
            position: fixed;
            width: 80px;
            height: 80px;
            pointer-events: none;
            z-index: 9999;
            transform: translate3d(-100px, -100px, 0);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        @media (hover: hover) { body { cursor: none; } }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .intro-title {
            font-size: clamp(1.5rem, 7vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 10px;
            opacity: 0;
            text-shadow: 0 0 30px rgba(0,0,0,0.2);
            animation: championReveal 2.5s ease-out forwards 1s;
        }

        @keyframes championReveal { to { opacity: 1; transform: scale(1); filter: blur(0); } }

        .content {
            padding: 60px 30px;
            max-width: 600px;
            margin: 0 auto 100px auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            line-height: 1.8;
        }

        @media (max-width: 480px) { .intro-title { letter-spacing: 4px; } }
    </style>
</head>

<body class="scroll-locked">

    <div id="mouse-glow"></div>
    <canvas id="particle-canvas"></canvas>
    <img id="oscar-cursor" src="https://www.formula1.com/content/dam/fom-website/drivers/O/OSCPIA01_Oscar_Piastri/oscpia01.png.transform/2col-retina/image.png" alt="Oscar">

    <section class="hero">
        <h1 class="intro-title">CONGRATULATIONS<br>PRAGJYTOI</h1>
    </section>

    <main class="content">
        <h2>P1. World Champion</h2>
        <p>[Write your heartfelt letter here!]</p>
        <span style="font-size: 3rem;">🧡🏆💙</span>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let particles = [];
function initParticles() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.5 + 0.2
        });
    }
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    particles.forEach(p => {
        p.y -= p.speed; // Drift upwards
        if (p.y < 0) p.y = canvas.height; // Loop back to bottom
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    requestAnimationFrame(animateParticles);
}

window.addEventListener('resize', initParticles);
initParticles();
animateParticles();
        const oscar = document.getElementById('oscar-cursor');
        const glow = document.getElementById('mouse-glow');

        function moveElements(x, y) {
            oscar.style.opacity = "1";
            glow.style.opacity = "1";
            oscar.style.transform = `translate3d(${x - 40}px, ${y - 40}px, 0)`;
            glow.style.transform = `translate3d(${x - 200}px, ${y - 200}px, 0)`;
        }

        document.addEventListener('mousemove', (e) => moveElements(e.clientX, e.clientY));
        document.addEventListener('touchstart', (e) => moveElements(e.touches[0].clientX, e.touches[0].clientY));
        document.addEventListener('touchmove', (e) => moveElements(e.touches[0].clientX, e.touches[0].clientY));

        
        window.scrollTo(0, 0);
        const lock = (e) => e.preventDefault();
        window.addEventListener('wheel', lock, { passive: false });
        window.addEventListener('touchmove', lock, { passive: false });

        
        setTimeout(() => {
            document.body.classList.remove('scroll-locked');
            window.removeEventListener('wheel', lock);
            window.removeEventListener('touchmove', lock);

           
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ffcc33', '#ff8000', '#ffffff', '#8a2be2']
                });
            }

            if (window.matchMedia("(hover: hover)").matches) {
                document.body.style.cursor = 'auto';
            }
        }, 5000);
    </script>
</body>
</html>
